<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birthday Vibe</title>

<link href="https://fonts.googleapis.com/css2?family=Kalam&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#f3e9dc url('https://www.transparenttextures.com/patterns/cream-paper.png');
font-family:'Kalam', cursive;
overflow:hidden;
}

/* title */
.title{
text-align:center;
font-size:28px;
margin-top:10px;
}

/* container */
.container{
position:relative;
width:100vw;
height:100vh;
}

/* images */
.sticker{
position:absolute;
width:90px;
height:90px;
object-fit:cover;
border-radius:12px;
cursor:pointer;
box-shadow:0 8px 18px rgba(0,0,0,0.3);
}

/* 📱 MOBILE PERFECT SCATTERED */
.s1{ top:70px; left:20px; transform:rotate(-8deg); }
.s2{ top:120px; left:120px; transform:rotate(6deg); }
.s3{ top:80px; right:20px; transform:rotate(-5deg); }
.s4{ top:190px; right:40px; transform:rotate(8deg); }
.s5{ bottom:160px; left:30px; width:120px; height:90px; transform:rotate(-6deg); }
.s6{ bottom:120px; right:40px; transform:rotate(5deg); }
.s7{ bottom:200px; left:50%; transform:translateX(-50%) rotate(-4deg); }

/* popup */
.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
}

.popup-box{
background:white;
padding:20px;
border-radius:10px;
font-size:16px;
width:260px;
text-align:center;
}

/* buttons */
.nav{
position:absolute;
bottom:10px;
width:100%;
text-align:center;
}

button{
padding:8px 16px;
margin:5px;
border:none;
background:black;
color:white;
cursor:pointer;
border-radius:6px;
}

/* symbols */
.symbol{
position:absolute;
font-size:16px;
opacity:0.5;
animation:float 5s linear infinite;
}

@keyframes float{
0%{ transform:translateY(0);}
100%{ transform:translateY(-40px);}
}

</style>
</head>

<body>

<div class="title">🎂 Happy Birthday 🎂</div>

<div class="container" id="container"></div>

<div class="nav">
<button onclick="prevPage()">←</button>
<button onclick="nextPage()">→</button>
</div>

<div class="popup" id="popup" onclick="closePopup()">
<div class="popup-box" id="popupText"></div>
</div>

<script>

let page=0

let messages=[
[
"Tu mila to sab change ho gaya 🙂",
"Tu special hai 💖",
"Tu hasi deta hai ✨",
"Tu yaad aata hai 😌",
"Tu vibe hai 🎧",
"Tu calm hai 🌙",
"Tu important hai ❤️"
],
[
"Sach bolu 😏",
"Tu best friend se zyada hai 💭",
"Thoda crush bhi hai ❤️",
"Par bol nahi paati 🙂",
"Darr lagta hai 🌸",
"Par tu samajh jayega 💫",
"Without saying 🫶"
],
[
"Aaj tera din hai 🎂",
"21 saal ka ho gaya 🎉",
"Still same tu 😌",
"Mere liye special 💖",
"Always rahe 🌟",
"Bas ek baat 🙂",
"🎂 HAPPY BIRTHDAY ❤️"
]
]

let images=[
[
"https://picsum.photos/200?1",
"https://picsum.photos/200?2",
"https://picsum.photos/200?3",
"https://picsum.photos/200?4",
"https://picsum.photos/200?5",
"https://picsum.photos/200?6",
"https://picsum.photos/200?7"
],
[
"https://picsum.photos/200?11",
"https://picsum.photos/200?12",
"https://picsum.photos/200?13",
"https://picsum.photos/200?14",
"https://picsum.photos/200?15",
"https://picsum.photos/200?16",
"https://picsum.photos/200?17"
],
[
"https://picsum.photos/200?21",
"https://picsum.photos/200?22",
"https://picsum.photos/200?23",
"https://picsum.photos/200?24",
"https://picsum.photos/200?25",
"https://picsum.photos/200?26",
"https://picsum.photos/200?27"
]
]

let positions=["s1","s2","s3","s4","s5","s6","s7"]

function loadPage(){
let container=document.getElementById("container")
container.innerHTML=""

messages[page].forEach((msg,i)=>{
let img=document.createElement("img")
img.src=images[page][i]
img.className="sticker "+positions[i]

img.onclick=()=>showPopup(msg)

container.appendChild(img)
})

addSymbols()
}

function showPopup(msg){
document.getElementById("popup").style.display="flex"
document.getElementById("popupText").innerHTML=
"🎂 <b>Happy Birthday</b><br><br>"+msg
}

function closePopup(){
document.getElementById("popup").style.display="none"
}

function nextPage(){
if(page<2){
page++
loadPage()
}
}

function prevPage(){
if(page>0){
page--
loadPage()
}
}

function addSymbols(){
let container=document.getElementById("container")

let icons=["✨","💖","🌙","⭐"]

for(let i=0;i<10;i++){
let s=document.createElement("div")
s.className="symbol"
s.innerHTML=icons[Math.floor(Math.random()*icons.length)]

s.style.left=Math.random()*100+"%"
s.style.top=Math.random()*100+"%"

container.appendChild(s)
}
}

loadPage()

</script>

</body>
</html>
