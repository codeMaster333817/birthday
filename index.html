<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birthday Vibe</title>

<link href="https://fonts.googleapis.com/css2?family=Kalam&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#f3e9dc url('https://www.transparenttextures.com/patterns/cream-paper.png');
font-family:'Kalam', cursive;
overflow-x:hidden;
}

/* title */
.title{
text-align:center;
font-size:38px;
margin-top:15px;
}

/* container */
.container{
display:grid;
grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
gap:20px;
padding:20px;
min-height:100vh;
}

/* images */
.sticker{
width:100%;
height:140px;
object-fit:cover;
border-radius:15px;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
transition:0.3s;
}

.sticker:hover{
transform:scale(1.05);
}

/* popup */
.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
}

.popup-box{
background:white;
padding:25px;
border-radius:12px;
font-size:18px;
width:280px;
text-align:center;
}

/* buttons */
.nav{
text-align:center;
margin:10px;
}

button{
padding:10px 20px;
margin:5px;
border:none;
background:black;
color:white;
cursor:pointer;
border-radius:8px;
}

/* ✨ symbols */
.symbol{
position:fixed;
font-size:18px;
opacity:0.5;
animation:float 6s linear infinite;
pointer-events:none;
}

@keyframes float{
0%{ transform:translateY(0);}
100%{ transform:translateY(-60px);}
}

</style>
</head>

<body>

<div class="title">🎂 Happy Birthday 🎂</div>

<div class="container" id="container"></div>

<div class="nav">
<button onclick="prevPage()">← Prev</button>
<button onclick="nextPage()">Next →</button>
</div>

<div class="popup" id="popup" onclick="closePopup()">
<div class="popup-box" id="popupText"></div>
</div>

<script>

let page=0

let messages=[

// PAGE 1
[
"Tu mila to sab change ho gaya 🙂",
"Tu special hai 💖",
"Tu hasi deta hai ✨",
"Tu yaad aata hai 😌",
"Tu vibe hai 🎧",
"Tu calm hai 🌙",
"Tu important hai ❤️"
],

// PAGE 2
[
"Sach bolu 😏",
"Tu best friend se zyada hai 💭",
"Thoda crush bhi hai ❤️",
"Par bol nahi paati 🙂",
"Darr lagta hai 🌸",
"Par tu samajh jayega 💫",
"Without saying 🫶"
],

// PAGE 3
[
"Aaj tera din hai 🎂",
"21 saal ka ho gaya 🎉",
"Still same tu 😌",
"Mere liye special 💖",
"Always rahe 🌟",
"Bas ek baat 🙂",
"🎂 HAPPY BIRTHDAY ❤️"
]

]

let images=[

// PAGE 1
[
"https://picsum.photos/300?11",
"https://picsum.photos/300?12",
"https://picsum.photos/300?13",
"https://picsum.photos/300?14",
"https://picsum.photos/300?15",
"https://picsum.photos/300?16",
"https://picsum.photos/300?17"
],

// PAGE 2
[
"https://picsum.photos/300?21",
"https://picsum.photos/300?22",
"https://picsum.photos/300?23",
"https://picsum.photos/300?24",
"https://picsum.photos/300?25",
"https://picsum.photos/300?26",
"https://picsum.photos/300?27"
],

// PAGE 3
[
"https://picsum.photos/300?31",
"https://picsum.photos/300?32",
"https://picsum.photos/300?33",
"https://picsum.photos/300?34",
"https://picsum.photos/300?35",
"https://picsum.photos/300?36",
"https://picsum.photos/300?37"
]

]

function loadPage(){
let container=document.getElementById("container")
container.innerHTML=""

messages[page].forEach((msg,i)=>{
let img=document.createElement("img")

img.src=images[page][i]
img.className="sticker"

img.onclick=()=>showPopup(msg)

container.appendChild(img)
})

addSymbols()
}

function showPopup(msg){
document.getElementById("popup").style.display="flex"

document.getElementById("popupText").innerHTML=
"🎂 <b>Happy Birthday</b> 🎂<br><br>"+msg
}

function closePopup(){
document.getElementById("popup").style.display="none"
}

function nextPage(){
if(page<2){
page++
loadPage()
}
}

function prevPage(){
if(page>0){
page--
loadPage()
}
}

/* ✨ floating symbols */
function addSymbols(){
for(let i=0;i<10;i++){
let s=document.createElement("div")
s.className="symbol"
s.innerHTML=["✨","💖","🌙","⭐"][Math.floor(Math.random()*4)]

s.style.left=Math.random()*100+"%"
s.style.top=Math.random()*100+"%"

document.body.appendChild(s)
}
}

loadPage()

</script>

</body>
</html>
