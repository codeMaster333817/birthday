<!DOCTYPE html>
<html>
<head>
<title>Birthday Vibe</title>

<link href="https://fonts.googleapis.com/css2?family=Kalam&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#f3e9dc url('https://www.transparenttextures.com/patterns/cream-paper.png');
font-family:'Kalam', cursive;
overflow:hidden;
}

/* title */
.title{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
font-size:45px;
}

/* container */
.container{
position:relative;
width:100vw;
height:100vh;
}

/* images */
.sticker{
position:absolute;
width:170px;
height:170px;
object-fit:cover;
border-radius:15px;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
transition:0.3s;
}

.sticker:hover{
transform:scale(1.1) rotate(3deg);
}

/* positions */
.s1{ top:80px; left:80px; }
.s2{ top:150px; left:420px; }
.s3{ top:100px; right:260px; }
.s4{ top:80px; right:80px; }
.s5{ bottom:150px; left:250px; width:220px; height:160px; }
.s6{ bottom:120px; right:260px; }
.s7{ bottom:140px; left:50%; transform:translateX(-50%); }

/* popup */
.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
}

.popup-box{
background:white;
padding:30px;
border-radius:12px;
font-size:20px;
width:320px;
text-align:center;
}

/* buttons */
.nav{
position:absolute;
bottom:20px;
width:100%;
text-align:center;
}

button{
padding:10px 20px;
margin:5px;
border:none;
background:#000;
color:white;
cursor:pointer;
}

/* ✨ floating symbols */
.symbol{
position:absolute;
font-size:20px;
opacity:0.6;
pointer-events:none;
animation:float 6s linear infinite;
}

@keyframes float{
0%{ transform:translateY(0); opacity:0.6;}
100%{ transform:translateY(-60px); opacity:0;}
}

</style>
</head>

<body>

<div class="title">🎂 Happy Birthday 🎂</div>

<div class="container" id="container"></div>

<div class="nav">
<button onclick="prevPage()">← Prev</button>
<button onclick="nextPage()">Next →</button>
</div>

<!-- popup -->
<div class="popup" id="popup" onclick="closePopup()">
<div class="popup-box" id="popupText"></div>
</div>

<script>

let page=0

let messages=[

// PAGE 1
[
"Tu mila to sab change ho gaya 🙂",
"Tu special hai 💖",
"Tu hasi deta hai ✨",
"Tu yaad aata hai 😌",
"Tu vibe hai 🎧",
"Tu calm hai 🌙",
"Tu important hai ❤️"
],

// PAGE 2
[
"Sach bolu 😏",
"Tu best friend se zyada hai 💭",
"Thoda crush bhi hai ❤️",
"Par bol nahi paati 🙂",
"Darr lagta hai 🌸",
"Par tu samajh jayega 💫",
"Without saying 🫶"
],

// PAGE 3
[
"Aaj tera din hai 🎂",
"21 saal ka ho gaya 🎉",
"Still same tu 😌",
"Mere liye special 💖",
"Always rahe 🌟",
"Bas ek baat 🙂",
"🎂 HAPPY BIRTHDAY ❤️"
]

]

/* अलग-अलग images हर page के लिए */
let images=[
[
"https://picsum.photos/300?11",
"https://picsum.photos/300?12",
"https://picsum.photos/300?13",
"https://picsum.photos/300?14",
"https://picsum.photos/300?15",
"https://picsum.photos/300?16",
"https://picsum.photos/300?17"
],
[
"https://picsum.photos/300?21",
"https://picsum.photos/300?22",
"https://picsum.photos/300?23",
"https://picsum.photos/300?24",
"https://picsum.photos/300?25",
"https://picsum.photos/300?26",
"https://picsum.photos/300?27"
],
[
"https://picsum.photos/300?31",
"https://picsum.photos/300?32",
"https://picsum.photos/300?33",
"https://picsum.photos/300?34",
"https://picsum.photos/300?35",
"https://picsum.photos/300?36",
"https://picsum.photos/300?37"
]
]

let positions=["s1","s2","s3","s4","s5","s6","s7"]

function loadPage(){
let container=document.getElementById("container")
container.innerHTML=""

/* images */
messages[page].forEach((msg,i)=>{
let img=document.createElement("img")

img.src=images[page][i]
img.className="sticker "+positions[i]

img.onclick=()=>showPopup(msg)

container.appendChild(img)
})

addSymbols()
}

/* popup */
function showPopup(msg){
document.getElementById("popup").style.display="flex"

document.getElementById("popupText").innerHTML=
"🎂 <b>Happy Birthday</b> 🎂<br><br>"+msg
}

function closePopup(){
document.getElementById("popup").style.display="none"
}

/* navigation */
function nextPage(){
if(page<2){
page++
loadPage()
}
}

function prevPage(){
if(page>0){
page--
loadPage()
}
}

/* ✨ symbols */
function addSymbols(){
let container=document.getElementById("container")

let icons=["✨","💖","🌙","💫","🎧","🦋","⭐"]

for(let i=0;i<15;i++){
let s=document.createElement("div")
s.className="symbol"
s.innerHTML=icons[Math.floor(Math.random()*icons.length)]

s.style.left=Math.random()*100+"%"
s.style.top=Math.random()*100+"%"
s.style.animationDuration=(Math.random()*3+4)+"s"

container.appendChild(s)
}
}

loadPage()

</script>

</body>
</html>
