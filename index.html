<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birthday Vibe</title>

<link href="https://fonts.googleapis.com/css2?family=Kalam&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#f3e9dc url('https://www.transparenttextures.com/patterns/cream-paper.png');
font-family:'Kalam', cursive;
}

/* title */
.title{
text-align:center;
font-size:22px;
padding:8px 0;
}

/* container */
.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
align-content:flex-start;
height:70vh;
padding:8px;
gap:10px;
}

/* 🔥 IMAGE (gap fix) */
.sticker{
width:31%;          /* balance size */
aspect-ratio:1/1;
margin:10px;         /* 👈 gap increase */
object-fit:cover;
border-radius:12px;
cursor:pointer;
box-shadow:0 6px 15px rgba(0,0,0,0.3);
}

/* tedi medi */
.sticker:nth-child(1){ transform:rotate(-8deg); }
.sticker:nth-child(2){ transform:rotate(6deg); }
.sticker:nth-child(3){ transform:rotate(-5deg); }
.sticker:nth-child(4){ transform:rotate(7deg); }
.sticker:nth-child(5){ transform:rotate(-6deg); }
.sticker:nth-child(6){ transform:rotate(5deg); }
.sticker:nth-child(7){ transform:rotate(-4deg); }

/* buttons */
.nav{
text-align:center;
margin:5px 0;
}

button{
padding:8px 16px;
margin:5px;
border:none;
background:black;
color:white;
border-radius:8px;
}

/* popup */
.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
}

.popup-box{
background:white;
padding:18px;
border-radius:10px;
font-size:15px;
width:240px;
text-align:center;
}

</style>
</head>

<body>

<div class="title">🎂 Happy Birthday 🎂</div>

<div class="container" id="container"></div>

<div class="nav" id="nav"></div>

<div class="popup" id="popup" onclick="closePopup()">
<div class="popup-box" id="popupText"></div>
</div>

<script>

let page=0

let messages = [
[
"Happy Birthday 🎂 Tame mari life no ek special part cho… bas aavi rite Khush rejo 💖",
"Tame jyare haso ne, tyare badhu saru lagva lage che 😊 bas aese hi haste rehna ✨",
"Sachu kav to tame mara mate bov j important cho… shayad tamne khabar nathi ❤️",
"Tamari sathe vaat karvi mane bov j game che 😊 tame badha karta alag cho 💫",
"Tame mari life no ek peaceful part cho 🌙 bas hamesha aavi rite j rejo 💖",
"Aapko yaad karke kabhi kabhi smile aa jati hai 🙂 kyuki aap special ho ❤️",
"Aap sath ho to sab acha lagta hai 😊 bas aese hi rehna ✨",
],
[
"Sachu kav to… tame best friend karta pan vadhare kai k lago cho 💖",
"Tamari sathe ni feeling alag che… simple pan special 😊",
"Aapse baat karne ka hamesha intzar rehta hai💫 kyuki aap important ho ❤️",
"Aap bina kuch kahe hi sab samaj jate ho 🫶 yahi to hai sab se achi baat ✨",
"Tamari sathe rehvu bov j saru lage che… aa feeling special che 💖",
"Tamara vagar divas thodo adhuro lage che 😊 Kyu ki aap khas jo ho gaye ho ❤️",
"Bas tame hamesha sathe rejo… etlu j Bov che 💫",
],
[
"Aaje tamaro divas che 🎂 mera cute dodo 🎉",
"21 saal complete 🎉 pan mara mate tame same special cho 😊",
"Tamari life ma badhu best male… tame deserve karo cho ✨",
"Tame jeva cho eva perfect cho 💖 sir ji",
"Bas ek wish… tame hamesha Khush rejo 😊",
"Kahin na kahin koi hai jo aapki care karta hai 💖",
"🎂 Happy Birthday ❤️ mere favourite Dodo 😊"
]
]

let images=[
[
"a.jpeg",
"b.jpeg",
"images/c.jpeg",
"images/d.jpeg",
"images/e.jpeg",
"images/f.jpeg",
"images/g.jpeg"
],
[
"images/q.jpeg",
"images/r.jpeg",
"images/s.jpeg",
"images/h.jpeg",
"images/i.jpeg",
"images/j.jpeg",
"images/k.jpeg"
],
[
"images/l.jpeg",
"images/m.jpeg",
"images/n.jpeg",
"images/o.jpeg",
"images/p.jpeg",
"images/t.jpeg",
"images/u.jpeg"
]
]

function loadPage(){
let container=document.getElementById("container")
container.innerHTML=""

messages[page].forEach((msg,i)=>{
let img=document.createElement("img")
img.src=images[page][i]
img.className="sticker"
img.onclick=()=>showPopup(msg)
container.appendChild(img)
})

updateButtons()
}

/* 🔥 BUTTON LOGIC */
function updateButtons(){
let nav=document.getElementById("nav")
nav.innerHTML=""

if(page>0){
let prev=document.createElement("button")
prev.innerText="Prev"
prev.onclick=prevPage
nav.appendChild(prev)
}

if(page<2){
let next=document.createElement("button")
next.innerText="Next"
next.onclick=nextPage
nav.appendChild(next)
}
}

function showPopup(msg){
document.getElementById("popup").style.display="flex"
document.getElementById("popupText").innerHTML=
"🎂 <b>Happy Birthday</b><br><br>"+msg
}

function closePopup(){
document.getElementById("popup").style.display="none"
}

function nextPage(){
page++
loadPage()
}

function prevPage(){
page--
loadPage()
}

loadPage()

</script>

</body>
</html>
