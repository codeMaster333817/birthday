<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birthday Vibe</title>

<link href="https://fonts.googleapis.com/css2?family=Kalam&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#f3e9dc url('https://www.transparenttextures.com/patterns/cream-paper.png');
font-family:'Kalam', cursive;
}

/* title */
.title{
text-align:center;
font-size:22px;
padding:8px 0;
}

/* container */
.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
align-content:flex-start;
height:70vh;
padding:8px;
}

/* 🔥 IMAGE (gap fix) */
.sticker{
width:31%;          /* balance size */
aspect-ratio:1/1;
margin:6px;         /* 👈 gap increase */
object-fit:cover;
border-radius:12px;
cursor:pointer;
box-shadow:0 6px 15px rgba(0,0,0,0.3);
}

/* tedi medi */
.sticker:nth-child(1){ transform:rotate(-8deg); }
.sticker:nth-child(2){ transform:rotate(6deg); }
.sticker:nth-child(3){ transform:rotate(-5deg); }
.sticker:nth-child(4){ transform:rotate(7deg); }
.sticker:nth-child(5){ transform:rotate(-6deg); }
.sticker:nth-child(6){ transform:rotate(5deg); }
.sticker:nth-child(7){ transform:rotate(-4deg); }

/* buttons */
.nav{
text-align:center;
margin:5px 0;
}

button{
padding:8px 16px;
margin:5px;
border:none;
background:black;
color:white;
border-radius:8px;
}

/* popup */
.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
}

.popup-box{
background:white;
padding:18px;
border-radius:10px;
font-size:15px;
width:240px;
text-align:center;
}

</style>
</head>

<body>

<div class="title">🎂 Happy Birthday 🎂</div>

<div class="container" id="container"></div>

<div class="nav" id="nav"></div>

<div class="popup" id="popup" onclick="closePopup()">
<div class="popup-box" id="popupText"></div>
</div>

<script>

let page=0

let messages=[
[
"Tu mila to sab change ho gaya 🙂",
"Tu special hai 💖",
"Tu hasi deta hai ✨",
"Tu yaad aata hai 😌",
"Tu vibe hai 🎧",
"Tu calm hai 🌙",
"Tu important hai ❤️"
],
[
"Sach bolu 😏",
"Tu best friend se zyada hai 💭",
"Thoda crush bhi hai ❤️",
"Par bol nahi paati 🙂",
"Darr lagta hai 🌸",
"Par tu samajh jayega 💫",
"Without saying 🫶"
],
[
"Aaj tera din hai 🎂",
"21 saal ka ho gaya 🎉",
"Still same tu 😌",
"Mere liye special 💖",
"Always rahe 🌟",
"Bas ek baat 🙂",
"🎂 HAPPY BIRTHDAY ❤️"
]
]

let images=[
[
"https://picsum.photos/200?1",
"https://picsum.photos/200?2",
"https://picsum.photos/200?3",
"https://picsum.photos/200?4",
"https://picsum.photos/200?5",
"https://picsum.photos/200?6",
"https://picsum.photos/200?7"
],
[
"https://picsum.photos/200?11",
"https://picsum.photos/200?12",
"https://picsum.photos/200?13",
"https://picsum.photos/200?14",
"https://picsum.photos/200?15",
"https://picsum.photos/200?16",
"https://picsum.photos/200?17"
],
[
"https://picsum.photos/200?21",
"https://picsum.photos/200?22",
"https://picsum.photos/200?23",
"https://picsum.photos/200?24",
"https://picsum.photos/200?25",
"https://picsum.photos/200?26",
"https://picsum.photos/200?27"
]
]

function loadPage(){
let container=document.getElementById("container")
container.innerHTML=""

messages[page].forEach((msg,i)=>{
let img=document.createElement("img")
img.src=images[page][i]
img.className="sticker"
img.onclick=()=>showPopup(msg)
container.appendChild(img)
})

updateButtons()
}

/* 🔥 BUTTON LOGIC */
function updateButtons(){
let nav=document.getElementById("nav")
nav.innerHTML=""

if(page>0){
let prev=document.createElement("button")
prev.innerText="Prev"
prev.onclick=prevPage
nav.appendChild(prev)
}

if(page<2){
let next=document.createElement("button")
next.innerText="Next"
next.onclick=nextPage
nav.appendChild(next)
}
}

function showPopup(msg){
document.getElementById("popup").style.display="flex"
document.getElementById("popupText").innerHTML=
"🎂 <b>Happy Birthday</b><br><br>"+msg
}

function closePopup(){
document.getElementById("popup").style.display="none"
}

function nextPage(){
page++
loadPage()
}

function prevPage(){
page--
loadPage()
}

loadPage()

</script>

</body>
</html>
