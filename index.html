<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birthday Vibe</title>

<link href="https://fonts.googleapis.com/css2?family=Kalam&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
overflow:hidden;
background:#f3e9dc url('https://www.transparenttextures.com/patterns/cream-paper.png');
font-family:'Kalam', cursive;
}

/* layout split exact */
.wrapper{
height:100vh;
display:flex;
flex-direction:column;
}

/* title */
.title{
height:8vh;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
}

/* 🔥 GRID FULL FIT */
.container{
flex:1;
display:grid;
grid-template-columns:1fr 1fr;
grid-template-rows:1fr 1fr 1fr 1fr;
gap:6px;
padding:6px;
}

/* images */
.sticker{
width:100%;
height:100%;
object-fit:cover;
border-radius:10px;
cursor:pointer;
}

/* last image center */
.sticker:nth-child(7){
grid-column:1 / span 2;
}

/* buttons */
.nav{
height:8vh;
display:flex;
justify-content:center;
align-items:center;
gap:10px;
}

button{
padding:8px 16px;
border:none;
background:black;
color:white;
border-radius:8px;
}

/* popup */
.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
}

.popup-box{
background:white;
padding:15px;
border-radius:10px;
font-size:14px;
width:230px;
text-align:center;
}

</style>
</head>

<body>

<div class="wrapper">

<div class="title">🎂 Happy Birthday 🎂</div>

<div class="container" id="container"></div>

<div class="nav">
<button onclick="prevPage()">Prev</button>
<button onclick="nextPage()">Next</button>
</div>

</div>

<div class="popup" id="popup" onclick="closePopup()">
<div class="popup-box" id="popupText"></div>
</div>

<script>

let page=0

let messages=[
[
"Tu mila to sab change ho gaya 🙂",
"Tu special hai 💖",
"Tu hasi deta hai ✨",
"Tu yaad aata hai 😌",
"Tu vibe hai 🎧",
"Tu calm hai 🌙",
"Tu important hai ❤️"
],
[
"Sach bolu 😏",
"Tu best friend se zyada hai 💭",
"Thoda crush bhi hai ❤️",
"Par bol nahi paati 🙂",
"Darr lagta hai 🌸",
"Par tu samajh jayega 💫",
"Without saying 🫶"
],
[
"Aaj tera din hai 🎂",
"21 saal ka ho gaya 🎉",
"Still same tu 😌",
"Mere liye special 💖",
"Always rahe 🌟",
"Bas ek baat 🙂",
"🎂 HAPPY BIRTHDAY ❤️"
]
]

let images=[
[
"https://picsum.photos/300?1",
"https://picsum.photos/300?2",
"https://picsum.photos/300?3",
"https://picsum.photos/300?4",
"https://picsum.photos/300?5",
"https://picsum.photos/300?6",
"https://picsum.photos/300?7"
],
[
"https://picsum.photos/300?11",
"https://picsum.photos/300?12",
"https://picsum.photos/300?13",
"https://picsum.photos/300?14",
"https://picsum.photos/300?15",
"https://picsum.photos/300?16",
"https://picsum.photos/300?17"
],
[
"https://picsum.photos/300?21",
"https://picsum.photos/300?22",
"https://picsum.photos/300?23",
"https://picsum.photos/300?24",
"https://picsum.photos/300?25",
"https://picsum.photos/300?26",
"https://picsum.photos/300?27"
]
]

function loadPage(){
let container=document.getElementById("container")
container.innerHTML=""

messages[page].forEach((msg,i)=>{
let img=document.createElement("img")
img.src=images[page][i]
img.className="sticker"
img.onclick=()=>showPopup(msg)
container.appendChild(img)
})
}

function showPopup(msg){
document.getElementById("popup").style.display="flex"
document.getElementById("popupText").innerHTML=
"🎂 <b>Happy Birthday</b><br><br>"+msg
}

function closePopup(){
document.getElementById("popup").style.display="none"
}

function nextPage(){
if(page<2){ page++; loadPage(); }
}

function prevPage(){
if(page>0){ page--; loadPage(); }
}

loadPage()

</script>

</body>
</html>
